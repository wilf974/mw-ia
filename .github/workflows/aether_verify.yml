name: aether-verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Run pytest
        run: pytest -q
      - name: Smoke test procedural training
        run: |
          python scripts/train_dqn_procedural.py --episodes 10 --mode obstacles --device cpu
          python scripts/train_dqn_procedural.py --episodes 10 --mode maze --device cpu
      - name: Smoke test recurrent procedural training
        run: |
          python scripts/train_drqn_procedural.py --episodes 10 --mode obstacles --device cpu
          python scripts/train_drqn_procedural.py --episodes 10 --mode maze --device cpu
      - name: Smoke test conv procedural training
        run: |
          python scripts/train_cnn_dqn_procedural.py --episodes 10 --mode obstacles --device cpu
          python scripts/train_cnn_dqn_procedural.py --episodes 10 --mode maze --device cpu

  aether-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke-check aether files exist
        run: bash aether/verify_all.sh
      # Note : la validation formelle effective (mcp__aether__aether_verify)
      # est executee en dev/local par Claude Code, pas dans cette CI publique
      # qui n'a pas l'interpreteur Aether. Si un binaire standalone devient
      # disponible, l'ajouter ici.
